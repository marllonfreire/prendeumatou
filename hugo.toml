# --- BASE CONFIGURATION ---
baseURL = "https://prendeumatou.com.br/"
languageCode = "pt-br"
title = "Prendeu, Matou"
theme = "PaperMod"

# CORRIGIDO: Substituído o 'paginate = 10' pela nova estrutura
[pagination]
  pagerSize = 10

enableRobotsTXT = true # Cria o arquivo robots.txt para SEO
buildDrafts = false # Não publica rascunhos em produção
buildFuture = false # Não publica posts com data futura
buildExpired = false # Não publica posts expirados
canonifyURLs = true # Garante URLs consistentes (útil se usar domínios diferentes)

# Habilita o Minify para CSS, JS, HTML (melhora performance)
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableTOML = false
  disableXML = false
  minifyOutput = true # Aplica minificação no output geral

# --- TAXONOMIES (Categorias e Tags) ---
# Essencial para organizar seu conteúdo de forma escalável
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series" # Para agrupar artigos em uma sequência (ex: "Série sobre Jakobs")

# --- PARAMETERS FOR THEME (PaperMod) ---
[params]
  env = "production" # Define o ambiente (útil para Analytics, etc.)
  defaultTheme = "dark" # Definindo tema escuro como padrão para combinar com logo
  disableThemeToggle = false # Permite ao usuário alternar entre claro/escuro
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true # Links para próximo/anterior artigo
  ShowBreadCrumbs = true # Trilha de navegação
  ShowCodeCopyButtons = true # Botão de copiar em blocos de código (útil se tiver código no futuro)
  comments = false # Desativa comentários globalmente (pode ser ativado por post)
  description = "Análises críticas sobre o Direito Penal do Inimigo e a expansão punitiva."
  author = "Prendeu, Matou" # Ou seu nome, se preferir
  keywords = ["Direito Penal", "Inimigo", "Jakobs", "Garantismo", "Punitivismo", "Estado de Exceção"] # Para SEO
  images = ["/capa_social.png"] # Imagem padrão para compartilhamento em redes sociais (Open Graph)
  
  # Apenas a versão correta do custom_css
  custom_css = ["/css/fonts.css", "/css/custom.css"] # Ordem importa: fonts primeiro

# --- Home Page (Página Inicial) ---
[params.homeInfoParams]
  Title = "Direito Penal do Inimigo ⚖️"
  Content = "Um espaço dedicado à análise crítica da supressão de garantias, do estado de exceção permanente e da teoria de Günther Jakobs."

