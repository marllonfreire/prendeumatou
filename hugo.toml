# --- MENU PRINCIPAL (Topo) ---
[menu]
  [[menu.main]]
    identifier = "artigos"
    name = "Artigos"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "sobre"
    name = "Sobre"
    url = "/sobre/"
    weight = 20
  [[menu.main]]
    identifier = "categorias"
    name = "Categorias"
    url = "/categories/"
    weight = 30 # Adiciona um link para todas as categorias
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 40 # Adiciona um link para todas as tags

# --- RENDER HOOKS (Para processar Markdown de forma personalizada) ---
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true # Permite HTML dentro do Markdown (cuidado com segurança, mas útil para customização)